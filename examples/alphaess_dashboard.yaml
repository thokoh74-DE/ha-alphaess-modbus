title: AlphaESS
type: sections
icon: mdi:solar-panel
max_columns: 4
sections:

  # ---------------------------------------------------------------------------
  # ROW 1 - Live status
  # ---------------------------------------------------------------------------
  - type: grid
    cards:
      - type: heading
        heading: Live

      - type: gauge
        entity: sensor.alphaess_inverter_battery_state_of_charge
        name: Battery
        min: 0
        max: 100
        needle: true
        severity:
          green: 50
          yellow: 20
          red: 0

      - type: glance
        title: Power Now
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.alphaess_inverter_current_pv_production
            name: PV
            icon: mdi:solar-power
          - entity: sensor.alphaess_inverter_current_house_load
            name: House
            icon: mdi:home-lightning-bolt
          - entity: sensor.alphaess_inverter_battery_power
            name: Battery
            icon: mdi:battery-charging
          - entity: sensor.alphaess_inverter_grid_power
            name: Grid
            icon: mdi:transmission-tower
          - entity: sensor.alphaess_inverter_active_power_pv_meter
            name: PV Meter
            icon: mdi:meter-electric

      - type: entities
        title: Battery Detail
        entities:
          - entity: sensor.alphaess_inverter_battery_state_of_charge
            name: State of Charge
          - entity: sensor.alphaess_inverter_battery_state_of_health
            name: State of Health
          - entity: sensor.alphaess_inverter_battery_remaining_time
            name: Remaining Time
          - type: section
          - entity: sensor.alphaess_inverter_battery_voltage
            name: Voltage
          - entity: sensor.alphaess_inverter_battery_current
            name: Current
          - entity: sensor.alphaess_inverter_battery_max_charge_current
            name: Max Charge Current
          - entity: sensor.alphaess_inverter_battery_max_discharge_current
            name: Max Discharge Current
          - type: section
          - entity: sensor.alphaess_inverter_battery_min_cell_temp
            name: Min Cell Temp
          - entity: sensor.alphaess_inverter_battery_max_cell_temp
            name: Max Cell Temp
          - entity: sensor.alphaess_inverter_battery_min_cell_voltage
            name: Min Cell Voltage
          - entity: sensor.alphaess_inverter_battery_max_cell_voltage
            name: Max Cell Voltage
          - type: section
          - entity: sensor.alphaess_inverter_battery_status
            name: Status

      - type: entities
        title: Solar Detail
        entities:
          - entity: sensor.alphaess_inverter_active_power_pv_meter
            name: Total (Meter)
          - type: section
          - entity: sensor.alphaess_inverter_pv_string_1_power
            name: String 1
          - entity: sensor.alphaess_inverter_pv_string_2_power
            name: String 2
          - entity: sensor.alphaess_inverter_pv_string_3_power
            name: String 3
          - entity: sensor.alphaess_inverter_pv_string_4_power
            name: String 4

      - type: entities
        title: Grid Detail
        entities:
          - entity: sensor.alphaess_inverter_grid_power
            name: Grid Power
          - entity: sensor.alphaess_inverter_grid_power_phase_a
            name: Phase A
          - entity: sensor.alphaess_inverter_grid_power_phase_b
            name: Phase B
          - entity: sensor.alphaess_inverter_grid_power_phase_c
            name: Phase C
          - entity: sensor.alphaess_inverter_grid_voltage_phase_a
            name: Voltage A
          - entity: sensor.alphaess_inverter_grid_frequency
            name: Frequency

  # ---------------------------------------------------------------------------
  # ROW 2 - Battery controls
  # ---------------------------------------------------------------------------
  - type: grid
    cards:
      - type: heading
        heading: Battery Controls

      - type: entities
        title: Force Charging
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.alphaess_inverter_force_charging
            name: Enable
          - entity: switch.alphaess_inverter_force_charging_hold
            name: Run Full Duration
          - entity: sensor.alphaess_inverter_force_charging_countdown
            name: Countdown
          - type: section
          - entity: number.alphaess_inverter_force_charging_power
            name: Power (kW)
          - entity: number.alphaess_inverter_force_charging_duration
            name: Duration (min)
          - entity: number.alphaess_inverter_force_charging_cutoff_soc
            name: Stop at SoC (%)

      - type: entities
        title: Force Discharging
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.alphaess_inverter_force_discharging
            name: Enable
          - entity: switch.alphaess_inverter_force_discharging_hold
            name: Run Full Duration
          - entity: sensor.alphaess_inverter_force_discharging_countdown
            name: Countdown
          - type: section
          - entity: number.alphaess_inverter_force_discharging_power
            name: Power (kW)
          - entity: number.alphaess_inverter_force_discharging_duration
            name: Duration (min)
          - entity: number.alphaess_inverter_force_discharging_cutoff_soc
            name: Stop at SoC (%)

      - type: entities
        title: Force Export
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.alphaess_inverter_force_export
            name: Enable
          - entity: switch.alphaess_inverter_force_export_hold
            name: Run Full Duration
          - entity: sensor.alphaess_inverter_force_export_countdown
            name: Countdown
          - type: section
          - entity: number.alphaess_inverter_force_export_power
            name: Target Export (kW)
          - entity: number.alphaess_inverter_force_export_duration
            name: Duration (min)
          - entity: number.alphaess_inverter_force_export_cutoff_soc
            name: Stop at SoC (%)

      - type: entities
        title: Excess Export
        show_header_toggle: false
        entities:
          - entity: switch.alphaess_inverter_excess_export
            name: Enable
          - entity: binary_sensor.alphaess_inverter_excess_export_pause
            name: Paused
          - type: section
          - entity: select.alphaess_inverter_inverter_ac_limit
            name: Inverter AC Limit

      - type: entities
        title: Force Import
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.alphaess_inverter_force_import
            name: Enable
          - entity: switch.alphaess_inverter_force_import_hold
            name: Run Full Duration
          - entity: binary_sensor.alphaess_inverter_force_import_pause
            name: Pause
          - entity: sensor.alphaess_inverter_force_import_countdown
            name: Countdown
          - type: section
          - entity: number.alphaess_inverter_force_import_power
            name: Import Power (kW)
          - entity: number.alphaess_inverter_force_import_duration
            name: Duration (min)
          - entity: number.alphaess_inverter_force_import_cutoff_soc
            name: SoC Target (%)

  # ---------------------------------------------------------------------------
  # ROW 3 - Schedule & settings
  # ---------------------------------------------------------------------------
  - type: grid
    cards:
      - type: heading
        heading: Schedule & Settings

      - type: entities
        title: Charge / Discharge Settings
        show_header_toggle: false
        entities:
          - entity: select.alphaess_inverter_charging_discharging_settings
            name: Mode
          - type: section
            label: Limits
          - entity: number.alphaess_inverter_charging_cutoff_soc
            name: Charging Cutoff SoC (%)
          - entity: number.alphaess_inverter_discharging_cutoff_soc
            name: Discharging Cutoff SoC (%)
          - entity: number.alphaess_inverter_max_feed_to_grid
            name: Max Feed to Grid (%)

      - type: entities
        title: Charging Periods
        show_header_toggle: false
        entities:
          - type: section
            label: Period 1
          - entity: time.alphaess_inverter_charging_period_1_start_time
            name: Start
          - entity: time.alphaess_inverter_charging_period_1_stop_time
            name: Stop
          - type: section
            label: Period 2
          - entity: time.alphaess_inverter_charging_period_2_start_time
            name: Start
          - entity: time.alphaess_inverter_charging_period_2_stop_time
            name: Stop

      - type: entities
        title: Discharging Periods
        show_header_toggle: false
        entities:
          - type: section
            label: Period 1
          - entity: time.alphaess_inverter_discharging_period_1_start_time
            name: Start
          - entity: time.alphaess_inverter_discharging_period_1_stop_time
            name: Stop
          - type: section
            label: Period 2
          - entity: time.alphaess_inverter_discharging_period_2_start_time
            name: Start
          - entity: time.alphaess_inverter_discharging_period_2_stop_time
            name: Stop

      - type: entities
        title: Dispatch
        show_header_toggle: false
        entities:
          - entity: switch.alphaess_inverter_dispatch
            name: Enable
          - entity: select.alphaess_inverter_dispatch_mode
            name: Mode
          - entity: number.alphaess_inverter_dispatch_power
            name: Power (kW)
          - entity: number.alphaess_inverter_dispatch_duration
            name: Duration (min)
          - entity: number.alphaess_inverter_dispatch_cutoff_soc
            name: Stop at SoC (%)
          - type: section
          - entity: button.alphaess_inverter_dispatch_reset
            name: Reset Dispatch
          - entity: button.alphaess_inverter_sync_dispatch_state
            name: Sync State
          - type: section
            label: Live Registers
          - entity: sensor.alphaess_inverter_dispatch_start
            name: Active
          - entity: sensor.alphaess_inverter_dispatch_active_power
            name: Active Power
          - entity: sensor.alphaess_inverter_dispatch_mode
            name: Active Mode
          - entity: sensor.alphaess_inverter_dispatch_soc
            name: SoC Target
          - entity: sensor.alphaess_inverter_dispatch_pv_switch
            name: PV Switch
          - entity: sensor.alphaess_inverter_dispatch_time
            name: Time Remaining
          - entity: sensor.alphaess_inverter_dispatch_time_remaining
            name: Countdown
          - entity: sensor.alphaess_inverter_dispatch_energy_flow_direction
            name: Energy Flow Direction
          - entity: sensor.alphaess_inverter_freq_dispatch_flag
            name: Freq Dispatch Flag

  # ---------------------------------------------------------------------------
  # ROW 4 - Energy & system
  # ---------------------------------------------------------------------------
  - type: grid
    cards:
      - type: heading
        heading: Energy & System

      - type: entities
        title: Today's Energy
        entities:
          - entity: sensor.alphaess_inverter_today_pv_generation
            name: PV Generation
          - entity: sensor.alphaess_inverter_today_energy_feed_to_grid
            name: Feed to Grid
          - entity: sensor.alphaess_inverter_today_energy_from_grid
            name: From Grid
          - entity: sensor.alphaess_inverter_today_battery_charged
            name: Battery Charged
          - entity: sensor.alphaess_inverter_today_battery_discharged
            name: Battery Discharged
          - entity: sensor.alphaess_inverter_today_battery_charged_from_grid
            name: Grid -> Battery

      - type: entities
        title: Lifetime Energy
        entities:
          - entity: sensor.alphaess_inverter_total_energy_from_pv
            name: From PV
          - entity: sensor.alphaess_inverter_total_energy_feed_to_grid_meter
            name: Feed to Grid
          - entity: sensor.alphaess_inverter_total_energy_consumption_from_grid_meter
            name: From Grid
          - entity: sensor.alphaess_inverter_total_energy_charge_battery
            name: Charged Battery
          - entity: sensor.alphaess_inverter_total_energy_discharge_battery
            name: Discharged Battery
          - entity: sensor.alphaess_inverter_total_energy_charge_battery_from_grid
            name: Grid -> Battery

      - type: entities
        title: System
        entities:
          - entity: sensor.alphaess_inverter_bms_version
            name: BMS Version
          - entity: sensor.alphaess_inverter_ems_version
            name: EMS Version
          - type: section
          - entity: sensor.alphaess_inverter_inverter_temperature
            name: Inverter Temperature
          - entity: sensor.alphaess_inverter_inverter_work_mode
            name: Work Mode
          - entity: sensor.alphaess_inverter_system_fault
            name: System Fault
          - entity: sensor.alphaess_inverter_battery_warning
            name: Battery Warning
          - entity: sensor.alphaess_inverter_battery_fault
            name: Battery Fault
          - type: section
            label: Maintenance
          - entity: button.alphaess_inverter_synchronise_date_time
            name: Sync Date & Time
          - entity: button.alphaess_inverter_restart_pcs
            name: Restart PCS
          - entity: button.alphaess_inverter_restart_ems
            name: Restart EMS
          - entity: button.alphaess_inverter_reset_energy_totals
            name: Reset Energy Totals
